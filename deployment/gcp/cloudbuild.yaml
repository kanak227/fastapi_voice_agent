steps:
  # ── 1. Build the merged image (gateway + 10 bot subprocesses) ──────────────
  # The Docker build context must include both fastapi_server/ AND
  # tekurious-chatbot-main/bots/, so we use the repo root.
  - name: 'gcr.io/cloud-builders/docker'
    id: build-bots
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/multi-bot-server:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/multi-bot-server:latest'
      - -f
      - 'tekurious-chatbot-main/bots/multi_bot_server/Dockerfile'
      - '.'

  # ── 2. Build Next.js frontend image ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/frontend:${SHORT_SHA}'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/frontend:latest'
      - 'tekurious-chatbot-main/tekurious-chatbot-ui'

  # ── 3. Push images ──────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-bots
    waitFor: [build-bots]
    args: [push, '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/multi-bot-server']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/frontend']

  # ── 4. Deploy the merged gateway+bots service ──────────────────────────────
  # min-instances=1 keeps it warm (no cold starts on first chat of the day).
  # 2 vCPU / 3 GiB has been load-tested with 10 idle bot subprocesses + LLM I/O.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-bots
    waitFor: [push-bots]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - multi-bot-server
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/multi-bot-server:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=3Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=4
      - --concurrency=20
      - --timeout=300
      - --set-env-vars=LLM_PROVIDER=gemini,GEMINI_MODEL=gemini-2.5-flash,UVICORN_RELOAD=0,ENV=production,FASTAPI_TENANT_ID=tenant-demo,USE_DEEPGRAM_ELEVENLABS=true,HTTP_CLIENT_TIMEOUT_SECONDS=300
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ELEVENLABS_API_KEY=ELEVENLABS_API_KEY:latest,ELEVENLABS_VOICE_ID=ELEVENLABS_VOICE_ID:latest,QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,REDIS_URL=REDIS_URL:latest,QWEN_TTS_BASE_URL=QWEN_TTS_BASE_URL:latest

  # ── 5. Deploy frontend to Cloud Run ─────────────────────────────────────────
  # The frontend talks to the merged service via TEKURIOUS_FASTAPI_URL.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: [push-frontend, deploy-bots]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe multi-bot-server --region=${_REGION} --format='value(status.url)')
        gcloud run deploy chatbot-frontend \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/frontend:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=4 \
          --concurrency=80 \
          --timeout=60 \
          --set-env-vars="NODE_ENV=production,FASTAPI_TENANT_ID=tenant-demo,TEKURIOUS_FASTAPI_URL=$${BACKEND_URL}"

substitutions:
  _REGION: us-central1

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/multi-bot-server:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/chatbot/frontend:${SHORT_SHA}'

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
